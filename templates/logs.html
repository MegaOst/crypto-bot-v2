<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 Logs - Trading Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #4ec9b0; }
        .nav a {
            color: #569cd6;
            text-decoration: none;
            padding: 10px 20px;
            background: #3e3e3e;
            border-radius: 5px;
        }
        .logs-container {
            background: #252526;
            border-radius: 10px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .log-line {
            padding: 5px 0;
            border-bottom: 1px solid #3e3e3e;
        }
        .log-INFO { color: #4ec9b0; }
        .log-WARNING { color: #dcdcaa; }
        .log-ERROR { color: #f48771; }
        button {
            padding: 10px 20px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📜 Logs</h1>
            <div class="nav">
                <a href="/">← Dashboard</a>
            </div>
        </div>
        <div>
            <button onclick="refreshLogs()">🔄 Rafraîchir</button>
            <label><input type="checkbox" id="auto" checked> Auto (5s)</label>
        </div>
        <div class="logs-container" id="logs">Chargement...</div>
    </div>

    <script>
        let interval = null;

        async function refreshLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                const container = document.getElementById('logs');
                
                container.innerHTML = data.logs.map(line => {
                    let cls = 'log-line';
                    if (line.includes('INFO')) cls += ' log-INFO';
                    else if (line.includes('WARNING')) cls += ' log-WARNING';
                    else if (line.includes('ERROR')) cls += ' log-ERROR';
                    return `<div class="${cls}">${line}</div>`;
                }).join('');
                
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                document.getElementById('logs').innerHTML = 'Erreur chargement';
            }
        }

        document.getElementById('auto').addEventListener('change', function() {
            if (this.checked) {
                interval = setInterval(refreshLogs, 5000);
            } else {
                clearInterval(interval);
            }
        });

        refreshLogs();
        interval = setInterval(refreshLogs, 5000);
    </script>
</body>
</html>
